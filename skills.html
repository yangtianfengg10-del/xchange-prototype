<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Skills • Xchange</title>
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body data-auth="0">
  <div id="app-header"></div>
  <main class="container" style="padding: 18px 0 6px">
    
<div class="row" style="justify-content:space-between; align-items:flex-end">
  <div>
    <div class="h2">Skills</div>
    <div class="muted">Browse Learn or Exchange courses. Purchase Learn courses with coins. Exchange requires Teacher & Student badge.</div>
  </div>
  <div class="row" style="align-items:center">
    <input id="searchBox" class="input" placeholder="Search courses…" style="width:260px" />
    <select id="filterDelivery" style="width:180px">
      <option value="all">All delivery</option>
      <option value="video">Video</option>
      <option value="live">Live session</option>
    </select>
  </div>
</div>

<div class="spacer"></div>

<div class="row" id="tabButtons">
  <button class="btn primary" data-cat="learn">Learn</button>
  <button class="btn" data-cat="exchange">Exchange</button>
</div>

<div class="spacer"></div>

<div id="coursesGrid"></div>

<div class="spacer"></div>

<div id="exchangePanel" style="display:none"></div>

  </main>
  <div id="app-footer"></div>
  <script src="assets/js/app.js"></script>
</body>
</html>
